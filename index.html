      <!-- Sidebar Header / Brand -->
      <div class="sidebar-header">
        <a href="#" class="sidebar-brand" onclick="loadWelcome(); return false;">
          <div class="sidebar-brand-icon">M</div>

      </div>

        <div class="sidebar-progress-bar">

        </div>
      </div>

    </aside>

    <!-- ═══════════ MAIN CONTENT ═══════════ -->
    <main class="main-content" id="mainContent">

      <!-- Top Header Bar -->
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="breadcrumb" id="breadcrumb">
            <span>হোম</span>
          </div>
        </div>
        <div class="header-right">
          
          <!-- Shortcut Corner Button -->
          <button class="header-btn" onclick="loadShortcutCorner()" title="30-সেকেন্ড শর্টকাট কর্নার">
            <i class="fa-solid fa-bolt"></i>
            <span class="btn-text">শর্টকাট কর্নার</span>
          </button>

          <!-- Print Button -->
          <button class="header-btn" onclick="handlePrint()" title="প্রিন্ট / PDF">
            <i class="fa-solid fa-print"></i>
            <span class="btn-text">প্রিন্ট</span>
          </button>

          <!-- Theme Dropdown -->
          <div class="theme-dropdown">
            <button class="header-btn" onclick="toggleThemeMenu()" title="থিম পরিবর্তন">
              <i class="fa-solid fa-palette"></i>
              <span class="btn-text">থিম</span>
            </button>
            <div class="theme-menu" id="themeMenu">
              <div class="theme-menu-item" data-theme="light" onclick="selectTheme('light')">
                <i class="fa-solid fa-sun"></i> Light Mode
              </div>
              <div class="theme-menu-item" data-theme="dark" onclick="selectTheme('dark')">
                <i class="fa-solid fa-moon"></i> Dark Mode
              </div>
              <div class="theme-menu-item" data-theme="cyberpunk" onclick="selectTheme('cyberpunk')">
                <i class="fa-solid fa-robot"></i> Cyberpunk Matrix
              </div>
            </div>
          </div>

        </div>
      </header>

      <!-- Content Area (Rendered by JS) -->
      <div class="content-area" id="contentArea">
        <!-- Populated by loadWelcome(), loadChapter(), loadShortcutCorner() -->
      </div>

    </main>

  </div>

  <!-- Back to Top -->
